<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — WoodCraft ERP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body class="login-page">

<div class="login-card">
  <div class="login-brand">
    <div class="login-brand-icon"><i class="fas fa-hammer"></i></div>
    <h1>WoodCraft ERP</h1>
    <p>Woodwork & Carpentry Management</p>
  </div>

  {% if error %}
  <div class="login-error"><i class="fas fa-circle-exclamation"></i> {{ error }}</div>
  {% endif %}

  <form method="POST">
    <div class="form-group" style="margin-bottom:16px">
      <label>Username</label>
      <input type="text" name="username" placeholder="Enter username" required autofocus>
    </div>
    <div class="form-group" style="margin-bottom:20px">
      <label>Password</label>
      <input type="password" name="password" placeholder="Enter password" required>
    </div>
    <button type="submit" class="login-btn"><i class="fas fa-right-to-bracket"></i> Sign In</button>
  </form>

  <div class="login-creds">
    <strong>Demo Credentials:</strong><br>
    admin / admin123 &nbsp;|&nbsp; manager / manager123<br>
    carpenter: rajan / rajan123
  </div>
</div>

</body>
</html>
